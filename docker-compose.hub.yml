# Run Dilbyrt from the published Docker Hub image — no local build required.
#
#   1. Download this file (and .env.example → .env):
#        curl -O https://raw.githubusercontent.com/hyprlab/dilbyrt/main/docker-compose.hub.yml
#        curl -o .env https://raw.githubusercontent.com/hyprlab/dilbyrt/main/.env.example
#   2. Edit .env — set DILBYRT_SECRET_KEY and DILBYRT_ADMIN_PASSWORD.
#   3. docker compose -f docker-compose.hub.yml up -d
#
# Then open http://localhost:8099 and sign in with the admin credentials.
services:
  dilbyrt:
    image: hyprlab/dilbyrt:latest
    container_name: dilbyrt
    ports:
      - "8099:8000"
    volumes:
      - ./data:/data
      # To enable live Google Sheets sync, drop your service-account key at
      # ./data/google_sa.json and uncomment DILBYRT_GOOGLE_SA_KEY below.
    environment:
      - DILBYRT_SECRET_KEY=${DILBYRT_SECRET_KEY:?DILBYRT_SECRET_KEY must be set in .env}
      - DILBYRT_ADMIN_USERNAME=${DILBYRT_ADMIN_USERNAME:-admin}
      - DILBYRT_ADMIN_PASSWORD=${DILBYRT_ADMIN_PASSWORD:?DILBYRT_ADMIN_PASSWORD must be set in .env}
      - DILBYRT_ADMIN_EMAIL=${DILBYRT_ADMIN_EMAIL:-admin@example.com}
      # - DILBYRT_GOOGLE_SA_KEY=/data/google_sa.json
      # Cookies are served WITHOUT the Secure flag by default so the app works
      # over plain HTTP (e.g. http://<server-ip>:8099). Set to 1 when serving
      # Dilbyrt behind HTTPS (a reverse proxy such as Caddy/nginx/Cloudflare).
      - DILBYRT_SECURE_COOKIES=${DILBYRT_SECURE_COOKIES:-0}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
